<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deps | Готовые решения</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Rubik', Arial, sans-serif;
    background: linear-gradient(180deg, #FFFFFF 0%, #F5F6FA 100%);
    color: #3b3f45;
}

header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    background: #fff;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    height: 40px;
    width: auto;
    display: block;
}

nav {
    display: flex;
    gap: 40px;
    align-items: center;
}

nav a {
    text-decoration: none;
    color: #3b3f45;
    font-weight: 500;
}

.btn {
    background: #009A44;
    color: #fff;
    border: none;
    padding: 14px 26px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Rubik', Arial, sans-serif;
    font-weight: normal;
    font-size: 16px;
}

.btn:hover {
    opacity: 0.9;
}

.menu-icon {
    display: none;
    font-size: 28px;
    cursor: pointer;
}

.menu-item-1, .menu-item-2 {
    display: flex;
    align-items: center;
    gap: 20px;
}

.menu-item-2 {
    gap: 40px;
}

.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 20px;
}

.label {
    color: #009A44;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.label::before {
    content: "";
    width: 30px;
    height: 2px;
    background: #009A44;
    display: inline-block;
}

h1 {
    font-size: 48px;
    margin-bottom: 50px;
    font-weight: 600;
}

.card {
    display: flex;
    gap: 40px;
    align-items: center;
}

.image-placeholder {
    width: 350px;
    height: 220px;
    background: #fff;
    border-radius: 0 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
}

.image-placeholder img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.card-content {
    flex: 1;
}

.card-content h2 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 15px;
}

.card-content p {
    margin-bottom: 15px;
    color: #5b6067;
}

.card-content ul {
    list-style-type: none;
    padding-left: 0;
    margin-bottom: 20px;
}

.card-content li {
    margin-bottom: 8px;
    padding-left: 20px;
    position: relative;
}

.card-content li::before {
    content: "•";
    color: #009A44;
    font-weight: 600;
    font-size: 18px;
    position: absolute;
    left: 0;
    top: 0;
}

.price-box {
    background: #fff;
    padding: 20px;
    text-align: center;
    min-width: 200px;
}

.price {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 20px;
}

@media (max-width: 768px) {
    header {
        padding: 15px 20px;
    }

    nav {
        display: none;
    }

    .menu-icon {
        display: block;
    }

    .container {
        padding: 30px 15px;
    }

    h1 {
        font-size: 32px;
    }

    .card {
        flex-direction: column;
        align-items: stretch;
    }

    .image-placeholder {
        width: 100%;
        height: 200px;
    }

    .price-box {
        margin-top: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 15px;
        min-width: auto;
    }
    
    .price {
        margin-bottom: 0;
    }
}
</style>
</head>
<body>

<header>
    <div class="menu-item-1">
        <span class="material-icons menu-icon">menu</span>
        <div class="logo">
            <img src="logo.svg" alt="logo">
        </div>
    </div>
    <div class="menu-item-2">
        <nav>
            <a href="#">Home</a>
            <a href="#">Feature</a>
            <a href="#">Pricing</a>
        </nav>
        <a href="mailto:example@example.com">
            <button class="btn">Узнать цену</button>
        </a>
    </div>
</header>

<div class="container">
    <div class="label">Надежные</div>
    <h1>Готовые решения</h1>

    <div class="card">
        <div class="image-placeholder">
            <img src="image.png" alt="image">
        </div>
        <div class="card-content">
            <h2>Комплект БАЗОВЫЙ</h2>
            <p>Проезд на территорию осуществляется при помощи телефонного звонка</p>
            <ul>
                <li>Шлагбаум</li>
                <li>Радар для обнаружения авто</li>
            </ul>
        </div>
        <div class="price-box">
            <div class="price">от 880$</div>
            <button class="btn">Купить</button>
        </div>
    </div>
</div>

</body>
</html>
